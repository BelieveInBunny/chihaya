name: testing

on:
    pull_request:
        branches:
            - master
        types: [ opened, synchronize, reopened ]

env:
    CGO_ENABLED: 0
    GO111MODULE: on
    GOMAXPROCS: 2

jobs:
    suite:
        runs-on: ubuntu-24.04
        services:
            mariadb:
                image: mariadb:11.4
                env:
                    MYSQL_RANDOM_ROOT_PASSWORD: yes
                    MYSQL_DATABASE: chihaya_test
                    MYSQL_USER: drone
                    MYSQL_PASSWORD: w33lkn0wn
                    MYSQL_INITDB_SKIP_TZINFO: yes
        steps:
            -   name: Checkout
                uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
            -   name: Set up Go
                uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6
                with:
                    go-version-file: ./go.mod
            -   name: Prepare database schema
                env:
                    DEBIAN_FRONTEND: noninteractive
                run: mysql -udrone -pw33lkn0wn -hmariadb chihaya_test < database/schema.sql
            -   name: Run tests
                env:
                    DB_DSN: 'drone:w33lkn0wn@(mariadb)/chihaya_test?multiStatements=true'
                run: go test ./... -v -pgo=off -buildvcs=false -coverprofile=./coverage.out
            -   name: Get coverage
                run: go tool cover -func=coverage.out